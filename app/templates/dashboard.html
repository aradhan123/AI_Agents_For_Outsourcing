<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}" />
</head>
<body>
  <main class="page">
    {% if messages %}
      <div class="toasts" aria-live="polite" aria-atomic="true">
        {% for item in messages %}
          <div class="toast toast-{{ item['category'] }}">{{ item["message"] }}</div>
        {% endfor %}
      </div>
    {% endif %}
    <section class="card">
      <h2 style="margin:0 0 10px;">Dashboard</h2>
      <p style="margin:0 0 16px; color: var(--muted);">
        You are signed in as <strong>{{ email }}</strong>.
      </p>

      <div style="display:flex; gap:10px; flex-wrap:wrap; margin:0 0 16px;">
        <a class="btn" style="width:auto; padding:10px 12px; text-decoration:none;" href="{{ url_for('web_meetings') }}">Meetings</a>
        <a class="btn" style="width:auto; padding:10px 12px; text-decoration:none;" href="{{ url_for('web_availability') }}">Availability</a>
      </div>

      <form method="POST" action="{{ url_for('web_logout') }}">
        <button class="btn btn-primary" type="submit">Log out</button>
      </form>
    </section>
  </main>
</body>
</html>
