<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ meeting["title"] }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}" />
</head>
<body>
  <main class="page">
    <section class="card" style="width:min(720px, 100%);">
      <a href="{{ url_for('web_meetings') }}" style="text-decoration:none; color: var(--muted); font-size:14px;">
        &larr; Back to meetings
      </a>

      <h2 style="margin:10px 0 6px;">{{ meeting["title"] }}</h2>

      <div style="display:grid; gap:10px; margin-top:12px; color: var(--muted); font-size:14px;">
        <div><strong style="color:#111827;">Organizer:</strong> {{ meeting["organizer_email"] }}</div>
        <div><strong style="color:#111827;">Start:</strong> {{ meeting["start_time"] }}</div>
        <div><strong style="color:#111827;">End:</strong> {{ meeting["end_time"] }}</div>
        <div><strong style="color:#111827;">Location:</strong> {{ meeting["location"] or "-" }}</div>
        <div><strong style="color:#111827;">Status:</strong> {{ meeting["status"] }}</div>
      </div>
    </section>
  </main>
</body>
</html>
